name: Build & release

# Builds + signs + notarizes yt-kb.app as a DMG on every push so the latest
# build is always grabbable from the workflow run's artifacts. Tag pushes
# (`v*`) additionally publish the DMG as a GitHub Release.
# Uses GitHub's macos-15 runner (Apple Silicon, Xcode + CommandLineTools both available).
# Tests run as a custom executable target — no XCTest dependency.

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

# Opt-in to Node.js 24 for JavaScript actions. actions/checkout@v4 and
# actions/upload-artifact@v4 still ship Node 20 (deprecated by GitHub for
# Actions runners). This silences the deprecation warning until both
# actions release a v5 on Node 24. Becomes default June 2026 anyway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Info.plist version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF##*/}"; tag="${tag#v}"
          plist=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          if [[ "$tag" != "$plist" ]]; then
            echo "::error::Tag v$tag does not match Info.plist CFBundleShortVersionString=$plist"
            exit 1
          fi
          echo "Tag and Info.plist agree on version $tag"

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Run unit tests
        run: swift run YTKBAppTests

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASS: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          KC_PASS: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/cert.p12"
          KC="$RUNNER_TEMP/build.keychain-db"
          echo -n "$CERT_B64" | base64 --decode -o "$CERT"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security import "$CERT" -P "$P12_PASS" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC"
          security list-keychain -d user -s "$KC" $(security list-keychains -d user | xargs)
          security find-identity -v -p codesigning

      - name: Build & package DMG
        env:
          SKIP_TESTS: "1"
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: ./scripts/build.sh

      - name: Sign, notarize and staple DMG
        env:
          SIGN_ID: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASS: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --sign "$SIGN_ID" --timestamp dist/YTKB.dmg
          xcrun notarytool submit dist/YTKB.dmg \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASS" \
              --team-id "$TEAM_ID" \
              --wait
          xcrun stapler staple dist/YTKB.dmg
          spctl -a -t open --context context:primary-signature -v dist/YTKB.dmg

      - name: Upload DMG artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: YTKB.dmg
          path: dist/YTKB.dmg
          retention-days: 30

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##*/}"
          # `--generate-notes` synthesises a changelog from PR titles between
          # this tag and the previous one, so we don't need a hand-written body.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/YTKB.dmg --clobber
